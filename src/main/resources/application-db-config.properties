sharding.jdbc.config.sharding.tables.t_order.actual-data-nodes=ds0.t_order_$->{(0..9).collect{String.format('%02d', it)}},ds1.t_order_$->{(10..19).collect{String.format('%02d', it)}},ds2.t_order_$->{(20..29).collect{String.format('%02d', it)}},ds3.t_order_$->{(30..39).collect{String.format('%02d', it)}},ds4.t_order_$->{(40..49).collect{String.format('%02d', it)}},ds5.t_order_$->{(50..59).collect{String.format('%02d', it)}},ds6.t_order_$->{(60..69).collect{String.format('%02d', it)}},ds7.t_order_$->{(70..79).collect{String.format('%02d', it)}},ds8.t_order_$->{(80..89).collect{String.format('%02d', it)}},ds9.t_order_$->{(90..99).collect{String.format('%02d', it)}}
sharding.jdbc.config.sharding.tables.t_order.database-strategy.standard.sharding-column=order_id
sharding.jdbc.config.sharding.tables.t_order.database-strategy.standard.precise-algorithm-class-name=com.snowalker.shardingjdbc.snowalker.demo.strategy.OrderDbShardingAlgorithm

sharding.jdbc.config.sharding.tables.t_order.table-strategy.standard.sharding-column=order_id
sharding.jdbc.config.sharding.tables.t_order.table-strategy.standard.precise-algorithm-class-name=com.snowalker.shardingjdbc.snowalker.demo.strategy.OrderTableShardingAlgorithm


